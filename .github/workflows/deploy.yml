name: Build and Deploy

on:
  push:
    branches: [ main ]
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DB_URL: jdbc:postgresql://localhost:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test-secret-key-for-ci-only-not-production

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -B
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/expense-tracker-global
            git fetch origin main
            git reset --hard origin/main
            chmod +x mvnw

            # Write environment variables
            cat << 'ENVEOF' > .env
            ${{ secrets.ENV_FILE }}
            ENVEOF

            # Write Telegram config for monitor scripts
            cat << 'TELEGRAMEOF' >> .env
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            TELEGRAMEOF

            # Build and start containers
            docker compose build
            docker compose up -d
            docker image prune -f

            # Wait for containers to be healthy before smoke tests
            # docker inspect gives us State.Status + Health without jq parsing issues
            echo "Waiting for containers to be healthy..."
            timeout=120
            elapsed=0
            while true; do
              BACKEND_STATE=$(docker inspect --format='{{.State.Status}}' expense-backend 2>/dev/null || echo "unknown")
              BACKEND_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' expense-backend 2>/dev/null || echo "unknown")
              NGINX_STATE=$(docker inspect --format='{{.State.Status}}' expense-nginx 2>/dev/null || echo "unknown")
              NGINX_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' expense-nginx 2>/dev/null || echo "unknown")
              echo "Backend: state=$BACKEND_STATE health=$BACKEND_HEALTH | Nginx: state=$NGINX_STATE health=$NGINX_HEALTH"
              if [[ "$BACKEND_STATE" == "running" && "$NGINX_STATE" == "running" ]]; then
                echo "All containers are running!"
                break
              fi
              if [[ "$BACKEND_STATE" == "restarting" || "$NGINX_STATE" == "restarting" ]]; then
                echo "A container is restarting — may be a startup issue"
                break
              fi
              sleep 5
              elapsed=$((elapsed + 5))
              if (( elapsed >= timeout )); then
                echo "Health check timed out after ${timeout}s"
                break
              fi
            done

            # Install / update monitoring cron jobs
            chmod +x script/install-cron.sh
            sudo ./script/install-cron.sh

            # Run smoke tests — fail deploy if any check fails
            chmod +x script/smoke-test.sh
            ./script/smoke-test.sh || {
              LAST_LOGS=$(docker compose logs backend --tail=30 2>&1 | tr '\n' '|' | cut -c1-1500)
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=❌ DEPLOY FAILED on ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AError: Smoke tests failed%0ALogs: ${LAST_LOGS}&parse_mode=HTML" || true
              exit 1
            }

            # Notify on successful deploy
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=✅ Deployed successfully: ${{ github.repository }} on ${{ github.ref_name }}%0ACommit: ${{ github.sha }}" || true