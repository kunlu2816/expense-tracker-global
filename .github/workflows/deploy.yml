name: Build and Deploy

on:
  push:
    branches: [ main ]
jobs:
  # ---------------------------------------------------------
  # JOB 1: TEST & SONARCLOUD SCAN (Chấm điểm Code)
  # ---------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DB_URL: jdbc:postgresql://localhost:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test-secret-key-for-ci-only-not-production

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full git history for SonarCloud analysis

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test coverage (backend)
        run: |
          chmod +x mvnw
          ./mvnw clean verify jacoco:report -B

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auto-created token for SonarCloud
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Personal token from Son
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies & Audit (frontend)
        working-directory: frontend
        run: | 
          npm ci
          npm audit --audit-level=critical || true  

  # ---------------------------------------------------------
  # JOB 2: BUILD IMAGE & SCAN (Đẩy lên GHCR)
  # ---------------------------------------------------------
  build-image:
    name: Build & Push Images
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Give permission for Github Actions to push to GHCR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Metadata (Tags)
        id: meta
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build Docker images
        run: |
          docker build -t ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }} .
          docker build -t ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }} ./frontend
      - name: Trivy Vulnerability Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'          # Sẽ đánh rớt Pipeline nếu phát hiện lỗi
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'    # Chỉ block lỗi Critical
      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
      TLS_DOMAIN: ${{ secrets.TLS_DOMAIN }}

    steps:
      - name: Lowercase Repository Name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/expense-tracker-global
            git fetch origin main
            git reset --hard origin/main

            # Write environment variables
            cat << 'ENVEOF' > .env
            ${{ secrets.ENV_FILE }}
            ENVEOF

            # Write Telegram config for monitor scripts
            cat << 'TELEGRAMEOF' >> .env
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            # Inject Link Image from GHCR
            BACKEND_IMAGE=ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
            FRONTEND_IMAGE=ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
            TELEGRAMEOF

            # Login GHCR in EC2 and Pull Images 
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker image prune -f

            # Bootstrap TLS certificates (idempotent — skips if cert already valid)
            chmod +x script/bootstrap-tls.sh
            LETSENCRYPT_EMAIL="${{ secrets.LETSENCRYPT_EMAIL }}" \
            TLS_DOMAIN="${{ secrets.TLS_DOMAIN }}" \
            ./script/bootstrap-tls.sh

            # Start all services
            docker compose up -d

            # Wait for containers to be healthy before smoke tests
            # docker inspect gives us State.Status + Health without jq parsing issues
            echo "Waiting for containers to be healthy..."
            timeout=120
            elapsed=0
            
            # Take Container ID dynamic from docker compose
            BACKEND_ID=$(docker compose ps -q backend)
            NGINX_ID=$(docker compose ps -q nginx)
            
            if [[ -z "$BACKEND_ID" || -z "$NGINX_ID" ]]; then
              echo "❌ Critical: Could not find container IDs for backend or nginx"
              exit 1
            fi
            
            while true; do
              BACKEND_STATE=$(docker inspect --format='{{.State.Status}}' $BACKEND_ID 2>/dev/null || echo "unknown")
              BACKEND_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' $BACKEND_ID 2>/dev/null || echo "unknown")
              NGINX_STATE=$(docker inspect --format='{{.State.Status}}' $NGINX_ID 2>/dev/null || echo "unknown")
              NGINX_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' $NGINX_ID 2>/dev/null || echo "unknown")
              echo "Backend: state=$BACKEND_STATE health=$BACKEND_HEALTH | Nginx: state=$NGINX_STATE health=$NGINX_HEALTH"
              if [[ "$BACKEND_HEALTH" == "healthy" && "$NGINX_HEALTH" == "healthy" ]]; then
                echo "✅ All containers are healthy!"
                break
              fi
              if [[ "$BACKEND_STATE" == "restarting" || "$NGINX_STATE" == "restarting" ]]; then
                echo "⚠️ A container is stuck in restarting loop — startup issue detected!"
                exit 1
              fi
              sleep 5
              elapsed=$((elapsed + 5))
              if (( elapsed >= timeout )); then
                echo "❌ Health check timed out after ${timeout}s"
                exit 1 
              fi
            done

            # Install / update monitoring cron jobs
            chmod +x script/*.sh
            sed -i 's/\r$//' script/monitor.sh
            sed -i 's/\r$//' etc/monitor-cron
            sudo ./script/install-cron.sh

            # Run smoke tests — fail deploy if any check fails
            chmod +x script/smoke-test.sh
            ./script/smoke-test.sh || {
              LAST_LOGS=$(docker compose logs backend --tail=30 2>&1 | tr '\n' '|' | cut -c1-1500)
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=❌ DEPLOY FAILED on ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AError: Smoke tests failed%0ALogs: ${LAST_LOGS}&parse_mode=HTML" || true
              exit 1
            }

            # Lưu lại trạng thái rollback thành công
            echo "${{ github.sha }}" > .last_successful_deploy
            
            # Notify on successful deploy
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=✅ Deployed successfully: ${{ github.repository }} on ${{ github.ref_name }}%0ACommit: ${{ github.sha }}" || true