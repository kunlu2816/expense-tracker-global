worker_processes auto;
events {
    worker_connections 1024;
}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Performance ---
    sendfile        on;
    keepalive_timeout 65;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- HTTP (port 80) — redirect to HTTPS ---
    server {
        listen 80;
        server_name _;
        # Let's Encrypt challenge (must stay on HTTP)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS (port 443) ---
    server {
        listen 443 ssl;
        server_name _;
        # --- SSL Certificates ---
        ssl_certificate     /etc/letsencrypt/live/spendwiser.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spendwiser.me/privkey.pem;
        # --- SSL Settings ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        # --- HSTS (force HTTPS for 1 year) ---

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        root /usr/share/nginx/html;
        index index.html;

        # --- index.html: never cache (prevents stale SPA shells) ---
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # --- API Reverse Proxy ---
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Actuator Health Proxy ---
        location /actuator/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Frontend SPA fallback ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Security Headers ---
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # --- Static assets: aggressive cache ---
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # --- Health Check ---
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }
}
