services:
  # --- PostgreSQL Database ---
  database:
    image: postgres:16-alpine
    container_name: expense-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MinhHieu2816@}
    volumes:
      - expense_data-global:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- Spring Boot Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-backend
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://database:5432/postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-MinhHieu2816@}
      JWT_SECRET: ${JWT_SECRET:-MySuperStrongSuperLongSecretKeyForSecurity2806}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    depends_on:
      database:
        condition: service_healthy
    restart: always

  # --- Nginx (Frontend + Reverse Proxy) ---
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-nginx
    ports:
      - "80:80"
      - "443:443" # HTTPS port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro        # NEW — SSL certs (read-only)
      - certbot-www:/var/www/certbot:ro        # NEW — challenge files (read-only)
    depends_on:
      - backend
    restart: always

  # --- Certbot (SSL Certificate Manager) ---
  certbot:
    image: certbot/certbot
    container_name: expense-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt           # writes certs here
      - certbot-www:/var/www/certbot           # writes challenge files here
volumes:
  expense_data-global:
  certbot-etc:
  certbot-www: