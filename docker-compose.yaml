services:
  # --- PostgreSQL Database ---
  database:
    image: postgres:16-alpine
    container_name: expense-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - expense_data-global:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- Spring Boot Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-backend
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      database:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # --- Nginx (Frontend + Reverse Proxy) ---
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-nginx
    ports:
      - "80:80"
      - "443:443" # HTTPS port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro        # NEW — SSL certs (read-only)
      - certbot-www:/var/www/certbot:ro        # NEW — challenge files (read-only)
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Certbot (SSL Certificate Manager) ---
  certbot:
    image: certbot/certbot
    container_name: expense-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt           # writes certs here
      - certbot-www:/var/www/certbot           # writes challenge files here
volumes:
  expense_data-global:
  certbot-etc:
  certbot-www: