server:
  port: 8080

spring:
  application:
    name: expense-tracking-global

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:MySuperStrongSuperLongSecretKeyForSecurity2806}
  expiration: 86400000 # 24 hours in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health,info      # NOT metrics — metrics expose too many internals publicly
  endpoint:
    health:
      show-details: when_authorized   # Default: only authenticated users see DB/internal details
      probes:
        enabled: true     # Enables /health/liveness and /health/readiness (K8s probes)
  health:
    db:
      enabled: true       # Checks PostgreSQL connection pool
    diskSpace:
      enabled: true      # Checks disk space

app:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080

# GoCardless Bank Account Data API configuration
# These credentials are used to authenticate with GoCardless API
gocardless:
  #  GoCardless secret ID (from GoCardless dashboard)
  secret-id: ${GOCARDLESS_SECRET_ID:your-secret-id-here}
  #  GoCardless secret key (from GoCardless dashboard)
  secret-key: ${GOCARDLESS_SECRET_KEY:your-secret-key-here}
  # GoCardless Bank Account Data API base URL
  base-url: https://bankaccountdata.gocardless.com
  # Where GoCardless redirects user after bank authorization
  # This must match what config in GoCardless dashboard
  redirect-url: ${APP_BASE_URL:http://localhost:8080}/api/banks/callback


# Transaction Sync Configuration
sync:
  # Enable/disable automatic background sync
  enabled: true
  # How often to sync (in minutes)
  interval-minutes: 15
  # How many days back to fetch on incremental sync
  look-back-days: 3
  # Only sync accounts where user was active within this many days
  active-user-days: 30
  # How many days of history to fetch for newly linked accounts
  initial-sync-days: 90